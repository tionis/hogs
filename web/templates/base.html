<!doctype html>
<html lang="en" data-theme="system">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{block "title" .}}Game Servers{{end}} - {{.SiteName}}</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      /* ── Theme variables ── */
      :root {
        --bg-primary: #0f0f1e;
        --bg-secondary: #161629;
        --bg-card: rgba(22, 22, 41, 0.88);
        --bg-card-hover: rgba(30, 30, 55, 0.95);
        --bg-input: rgba(0, 0, 0, 0.3);
        --bg-input-focus: rgba(0, 0, 0, 0.5);
        --border-color: rgba(255, 255, 255, 0.1);
        --border-hover: rgba(255, 255, 255, 0.25);
        --text-primary: #f0f0f5;
        --text-secondary: #a0a0b8;
        --text-heading: #ffffff;
        --accent: #5eaeff;
        --accent-hover: #8cc5ff;
        --accent-glow: rgba(94, 174, 255, 0.35);
        --success: #4ade80;
        --danger: #f87171;
        --warning: #fbbf24;
        --info: #60a5fa;
        --badge-bg: rgba(255, 255, 255, 0.08);
        --badge-text: #e0e0e0;
        --nav-bg: rgba(10, 10, 24, 0.95);
        --nav-border: rgba(255, 255, 255, 0.06);
        --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
        --shadow-card-hover: 0 8px 40px rgba(0, 0, 0, 0.55);
        --glow-online: 0 0 12px rgba(74, 222, 128, 0.5);
        --glow-offline: 0 0 12px rgba(248, 113, 113, 0.5);
        --table-stripe: rgba(255, 255, 255, 0.03);
        --table-header-bg: rgba(0, 0, 0, 0.4);
        --btn-close-filter: invert(1);
        --form-check-bg: rgba(255, 255, 255, 0.08);
      }

      [data-theme="light"] {
        --bg-primary: #f4f5f7;
        --bg-secondary: #ffffff;
        --bg-card: #ffffff;
        --bg-card-hover: #f8f9fa;
        --bg-input: #f0f1f3;
        --bg-input-focus: #e8e9eb;
        --border-color: rgba(0, 0, 0, 0.1);
        --border-hover: rgba(0, 0, 0, 0.2);
        --text-primary: #1a1a2e;
        --text-secondary: #5c5c7a;
        --text-heading: #111127;
        --accent: #2563eb;
        --accent-hover: #3b82f6;
        --accent-glow: rgba(37, 99, 235, 0.2);
        --success: #16a34a;
        --danger: #dc2626;
        --warning: #d97706;
        --info: #2563eb;
        --badge-bg: rgba(0, 0, 0, 0.06);
        --badge-text: #374151;
        --nav-bg: #ffffff;
        --nav-border: rgba(0, 0, 0, 0.08);
        --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.08);
        --shadow-card-hover: 0 4px 20px rgba(0, 0, 0, 0.12);
        --glow-online: 0 0 8px rgba(22, 163, 74, 0.3);
        --glow-offline: 0 0 8px rgba(220, 38, 38, 0.3);
        --table-stripe: rgba(0, 0, 0, 0.03);
        --table-header-bg: rgba(0, 0, 0, 0.04);
        --btn-close-filter: none;
        --form-check-bg: #ffffff;
      }

      @media (prefers-color-scheme: light) {
        [data-theme="system"] {
          --bg-primary: #f4f5f7;
          --bg-secondary: #ffffff;
          --bg-card: #ffffff;
          --bg-card-hover: #f8f9fa;
          --bg-input: #f0f1f3;
          --bg-input-focus: #e8e9eb;
          --border-color: rgba(0, 0, 0, 0.1);
          --border-hover: rgba(0, 0, 0, 0.2);
          --text-primary: #1a1a2e;
          --text-secondary: #5c5c7a;
          --text-heading: #111127;
          --accent: #2563eb;
          --accent-hover: #3b82f6;
          --accent-glow: rgba(37, 99, 235, 0.2);
          --success: #16a34a;
          --danger: #dc2626;
          --warning: #d97706;
          --info: #2563eb;
          --badge-bg: rgba(0, 0, 0, 0.06);
          --badge-text: #374151;
          --nav-bg: #ffffff;
          --nav-border: rgba(0, 0, 0, 0.08);
          --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.08);
          --shadow-card-hover: 0 4px 20px rgba(0, 0, 0, 0.12);
          --glow-online: 0 0 8px rgba(22, 163, 74, 0.3);
          --glow-offline: 0 0 8px rgba(220, 38, 38, 0.3);
          --table-stripe: rgba(0, 0, 0, 0.03);
          --table-header-bg: rgba(0, 0, 0, 0.04);
          --btn-close-filter: none;
          --form-check-bg: #ffffff;
        }
      }

      /* ── Base ── */
      body {
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Inter', system-ui, sans-serif;
        min-height: 100vh;
        transition: background 0.3s ease, color 0.3s ease;
      }

      h1, h2, h3, h4, h5, h6 { font-weight: 700; letter-spacing: -0.3px; color: var(--text-heading); }

      a { color: var(--accent); text-decoration: none; }
      a:hover { color: var(--accent-hover); text-decoration: underline; }

      .text-muted { color: var(--text-secondary) !important; }

      /* ── Navbar ── */
      .navbar {
        background: var(--nav-bg) !important;
        border-bottom: 1px solid var(--nav-border);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        margin-bottom: 1.5rem;
        transition: background 0.3s ease;
      }
      .navbar-brand {
        font-size: 1.4rem;
        font-weight: 800;
        letter-spacing: 1.5px;
        color: var(--accent) !important;
        text-decoration: none;
      }
      .navbar-brand:hover { color: var(--accent-hover) !important; }

      /* ── Theme toggle ── */
      .theme-toggle {
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 3px;
        display: inline-flex;
        gap: 2px;
      }
      .theme-toggle button {
        background: none;
        border: none;
        border-radius: 16px;
        padding: 4px 10px;
        font-size: 0.85rem;
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .theme-toggle button.active {
        background: var(--accent);
        color: #fff;
        box-shadow: 0 2px 8px var(--accent-glow);
      }
      .theme-toggle button:hover:not(.active) { background: var(--bg-card-hover); color: var(--text-primary); }

      /* ── Cards ── */
      .card {
        background: var(--bg-card) !important;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        box-shadow: var(--shadow-card);
        transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      }
      .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-card-hover); border-color: var(--border-hover); }
      .card-body { color: var(--text-primary); }
      .card-title a { color: var(--accent) !important; font-weight: 700; }
      .card-title a:hover { color: var(--accent-hover) !important; }
      .card-subtitle { color: var(--text-secondary) !important; }
      .card-text { color: var(--text-primary); }
      .card-header { background: var(--badge-bg); color: var(--text-heading); border-bottom: 1px solid var(--border-color); font-weight: 700; }

      /* ── Status indicators ── */
      .status-online { color: var(--success) !important; font-weight: 700; text-shadow: var(--glow-online); }
      .status-offline { color: var(--danger) !important; font-weight: 700; text-shadow: var(--glow-offline); }

      /* ── Game badges ── */
      .game-badge { border-radius: .375em; font-size: .85em; padding: .35em .65em; display: inline-flex; align-items: center; gap: .3em; white-space: nowrap; }
      .game-badge .game-icon { width: 1em; height: 1em; display: inline-block; }

      /* ── Buttons ── */
      .btn {
        border-radius: 8px;
        font-weight: 600;
        letter-spacing: 0.3px;
        font-size: 0.875rem;
        padding: 0.45rem 1.1rem;
        border: none;
        transition: all 0.2s;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent), #000 20%));
        box-shadow: 0 4px 14px var(--accent-glow);
        color: #fff;
      }
      .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); color: #fff; filter: brightness(1.1); }
      .btn-outline-primary {
        border: 2px solid var(--accent);
        color: var(--accent);
        background: transparent;
      }
      .btn-outline-primary:hover { background: var(--accent); color: #fff; box-shadow: 0 0 12px var(--accent-glow); }
      .btn-outline-info { border-color: var(--info); color: var(--info); }
      .btn-outline-info:hover { background: var(--info); color: #fff; }
      .btn-outline-danger { border-color: var(--danger); color: var(--danger); }
      .btn-outline-danger:hover { background: var(--danger); color: #fff; }
      .btn-outline-light { border-color: var(--text-secondary); color: var(--text-secondary); }
      .btn-outline-light:hover { background: var(--text-secondary); color: var(--bg-primary); }
      .btn-success { background: var(--success); }
      .btn-secondary { background: var(--text-secondary); }

      /* ── Tables ── */
      .table-responsive { border-radius: 12px; overflow: hidden; }
      .table {
        color: var(--text-primary);
        border-color: var(--border-color);
        --bs-table-bg: transparent;
        --bs-table-striped-bg: var(--table-stripe);
        --bs-table-color: var(--text-primary);
        --bs-table-hover-bg: var(--bg-card-hover);
      }
      .table th { color: var(--text-heading); border-bottom: 2px solid var(--border-color); background: var(--table-header-bg); }
      .table td { color: var(--text-primary); vertical-align: middle; }

      /* ── Forms ── */
      .form-control, .form-select {
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        border-radius: 8px;
      }
      .form-control:focus, .form-select:focus { background: var(--bg-input-focus); border-color: var(--accent); color: var(--text-primary); box-shadow: 0 0 0 0.2rem var(--accent-glow); }
      .form-control::placeholder { color: var(--text-secondary); }
      .form-check-input { background-color: var(--form-check-bg); border-color: var(--border-color); }
      .form-check-input:checked { background-color: var(--accent); border-color: var(--accent); }
      .form-label, .form-text { color: var(--text-secondary); }

      /* ── Tag Input ── */
      .tag-input-container {
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 0.375rem 0.5rem;
        min-height: 38px;
        display: flex;
        flex-wrap: wrap;
        gap: 0.375rem;
        align-items: center;
        cursor: text;
      }
      .tag-input-container:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 0.2rem var(--accent-glow);
      }
      .tag-input-container .tag-pill {
        background: var(--accent);
        color: #fff;
        padding: 0.2rem 0.5rem;
        border-radius: 12px;
        font-size: 0.8rem;
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        white-space: nowrap;
      }
      .tag-input-container .tag-pill button {
        background: none;
        border: none;
        color: inherit;
        padding: 0;
        font-size: 1rem;
        line-height: 1;
        cursor: pointer;
        opacity: 0.7;
      }
      .tag-input-container .tag-pill button:hover { opacity: 1; }
      .tag-input-container input {
        background: transparent;
        border: none;
        color: var(--text-primary);
        outline: none;
        flex: 1;
        min-width: 120px;
        padding: 0.2rem;
      }
      .tag-input-container input::placeholder { color: var(--text-secondary); }

      /* ── List groups ── */
      .list-group-item { background: transparent; color: var(--text-primary) !important; border-color: var(--border-color); }
      .list-group-item-action:hover { background: var(--bg-card-hover); color: var(--text-primary); }

      /* ── Badges ── */
      .badge { font-weight: 600; letter-spacing: 0.3px; padding: 0.4em 0.7em; border-radius: 6px; }
      .bg-secondary { background-color: var(--badge-bg) !important; color: var(--badge-text) !important; }
      .bg-success { background-color: var(--success) !important; color: #fff !important; }
      .bg-danger { background-color: var(--danger) !important; color: #fff !important; }
      .bg-info { background-color: var(--info) !important; color: #fff !important; }
      .bg-warning { background-color: var(--warning) !important; color: #222 !important; }

      /* ── Breadcrumbs ── */
      .breadcrumb-item { color: var(--text-secondary); }
      .breadcrumb-item a { color: var(--accent) !important; font-weight: 600; }
      .breadcrumb-item.active { color: var(--text-primary); }

      /* ── Modals ── */
      .modal-content { background: var(--bg-card) !important; border: 1px solid var(--border-color); border-radius: 12px; }
      .modal-header { border-bottom: 1px solid var(--border-color); }
      .modal-footer { border-top: 1px solid var(--border-color); }
      .btn-close { filter: var(--btn-close-filter); }

      /* ── Server status poller ── */
      .server-status-poller { color: var(--text-secondary) !important; }

      /* ── Code ── */
      code { color: var(--accent); background: var(--badge-bg); padding: 2px 6px; border-radius: 4px; }

      /* ── Filter buttons ── */
      #game-filter .btn { font-size: 0.8rem; padding: 4px 12px; }

      /* ── Background ── */
      body.has-background {
        background-size: cover;
        background-position: center center;
        background-attachment: fixed;
        background-repeat: no-repeat;
      }
      body.has-background::before {
        content: '';
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: -1;
      }
      [data-theme="light"] body.has-background::before {
        background: rgba(255,255,255,0.6);
      }
      @media (prefers-color-scheme: light) {
        [data-theme="system"] body.has-background::before {
          background: rgba(255,255,255,0.6);
        }
      }
      body.hogs-bg-dark { background-image: url('{{.BackgroundURLs.Dark}}'); }
      body.hogs-bg-light { background-image: url('{{.BackgroundURLs.Light}}'); }
    </style>
    <script>window.HOGS_GAME_NOUNS = {{gameNounMapJS}};</script>
  </head>
  <body {{block "body_attrs" .}}{{end}}>
    <nav class="navbar navbar-expand-lg mb-4">
      <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
          <img src="/assets/logo.svg" alt="" width="36" height="36" style="border-radius:8px;">
          {{.SiteName}}
        </a>
        <div class="d-flex align-items-center gap-3">
          <div class="theme-toggle" id="theme-toggle">
            <button type="button" data-theme="system" class="active" title="Follow system">&#9788;</button>
            <button type="button" data-theme="light" title="Light mode">&#9728;</button>
            <button type="button" data-theme="dark" title="Dark mode">&#9790;</button>
          </div>
{{if .Authenticated}}
            {{if eq .UserRole "admin"}}<a href="/admin" class="btn btn-outline-light btn-sm">Admin</a>{{end}}

      </div>
    </nav>

    <div class="container">
      {{block "content" .}}{{end}}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('hogs-theme', theme);
        document.querySelectorAll('#theme-toggle button').forEach(b => {
          b.classList.toggle('active', b.dataset.theme === theme);
        });
        applyBackground();
      }

      function applyBackground() {
        const bgDark = '{{.BackgroundURLs.Dark}}';
        const bgLight = '{{.BackgroundURLs.Light}}';
        if (!bgDark && !bgLight) return;
        const currentTheme = document.documentElement.getAttribute('data-theme') || 'system';
        let effectiveTheme = currentTheme;
        if (currentTheme === 'system') {
          effectiveTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.body.classList.remove('hogs-bg-dark', 'hogs-bg-light', 'has-background');
        if (effectiveTheme === 'dark' && bgDark) {
          document.body.style.backgroundImage = '';
          document.body.classList.add('hogs-bg-dark', 'has-background');
        } else if (effectiveTheme === 'light' && bgLight) {
          document.body.style.backgroundImage = '';
          document.body.classList.add('hogs-bg-light', 'has-background');
        } else if (bgDark) {
          document.body.style.backgroundImage = '';
          document.body.classList.add('hogs-bg-dark', 'has-background');
        }
      }

      (function() {
        const saved = localStorage.getItem('hogs-theme');
        if (saved) { applyTheme(saved); }
        else { applyTheme('system'); }
      })();

      document.querySelectorAll('#theme-toggle button').forEach(btn => {
        btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
      });

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (document.documentElement.getAttribute('data-theme') === 'system') {
          applyBackground();
        }
      });

      document.addEventListener("DOMContentLoaded", function() {
        // Inject CSRF token into all POST forms
        function injectCSRFToken() {
          const match = document.cookie.match(/hogs-csrf=([^;]+)/);
          if (!match) return;
          const cookieValue = decodeURIComponent(match[1]);
          const token = cookieValue.split('.')[0];
          if (!token) return;
          document.querySelectorAll('form[method="POST"]').forEach(function(form) {
            if (form.querySelector('input[name="csrf_token"]')) return;
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'csrf_token';
            input.value = token;
            form.appendChild(input);
          });
        }
        injectCSRFToken();

        // Tag Input Component
        window.initTagInput = function(containerId, hiddenInputId, initialTags) {
          const container = document.getElementById(containerId);
          if (!container) return;
          const hiddenInput = document.getElementById(hiddenInputId);
          let tags = initialTags || [];

          function render() {
            // Clear container but keep input
            const existingInput = container.querySelector('input');
            container.innerHTML = '';
            tags.forEach(tag => {
              const pill = document.createElement('span');
              pill.className = 'tag-pill';
              pill.innerHTML = `${escapeHtml(tag)} <button type="button" onclick="window.removeTag('${containerId}', '${hiddenInputId}', '${tag.replace(/'/g, "\\'")}')">&times;</button>`;
              container.appendChild(pill);
            });
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = tags.length === 0 ? 'Type tag and press Enter...' : '';
            input.addEventListener('keydown', function(e) {
              if (e.key === 'Enter' || e.key === ',' || e.key === ' ') {
                e.preventDefault();
                const val = this.value.trim();
                if (val && !tags.includes(val)) {
                  tags.push(val);
                  updateHidden();
                  render();
                }
              } else if (e.key === 'Backspace' && this.value === '' && tags.length > 0) {
                tags.pop();
                updateHidden();
                render();
              }
            });
            input.addEventListener('blur', function() {
              // Don't auto-add on blur to avoid duplicate adds when Enter triggers blur
            });
            container.appendChild(input);
            input.focus();
          }

          function updateHidden() {
            if (hiddenInput) hiddenInput.value = tags.join(',');
          }

          function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
          }

          container.addEventListener('click', function() {
            const input = container.querySelector('input');
            if (input) input.focus();
          });

          render();
        };

        window.removeTag = function(containerId, hiddenInputId, tag) {
          const container = document.getElementById(containerId);
          if (!container) return;
          const hiddenInput = document.getElementById(hiddenInputId);
          const pills = container.querySelectorAll('.tag-pill');
          pills.forEach(pill => {
            if (pill.textContent.trim().replace('×', '').trim() === tag) {
              pill.remove();
            }
          });
          const remainingTags = [];
          container.querySelectorAll('.tag-pill').forEach(pill => {
            remainingTags.push(pill.textContent.trim().replace('×', '').trim());
          });
          if (hiddenInput) hiddenInput.value = remainingTags.join(',');
        };

        function updateServerStatus(el) {
          const serverName = el.dataset.server;
          const gameType = el.dataset.gameType || 'minecraft';
          const serverState = el.dataset.state || 'auto';
          if (serverState !== 'online' && serverState !== 'auto') {
            el.innerHTML = `<span class="text-muted">${serverState.charAt(0).toUpperCase() + serverState.slice(1)}</span>`;
            return;
          }
          el.dataset.polling = 'true';
          fetch(`/api/servers/${serverName}/status`)
            .then(r => r.json())
            .then(data => {
              const badgeEl = document.getElementById(`status-badge-${serverName}`);
              if (data.online) {
                let statusText = '';
                const noun = window.HOGS_GAME_NOUNS[gameType] || 'Players';
                statusText = `<span class="status-online">Online</span> - ${data.players}/${data.maxPlayers} ${noun}`;
                if (data.version) statusText += ` (${data.version})`;
                if (data.mapName && gameType === 'satisfactory') statusText += ` in ${data.mapName}`;
                el.innerHTML = statusText;

                if(data.serverMessage && gameType === 'minecraft') {
                  const motdEl = document.getElementById(`live-motd-${serverName}`);
                  if (motdEl) {
                    motdEl.innerText = data.serverMessage;
                    motdEl.style.display = 'block';
                  }
                }
                if(data.playerList && data.playerList.length > 0) {
                    const playerListEl = document.getElementById(`player-list-${serverName}`);
                    if(playerListEl) {
                        const names = data.playerList.map(p => p.name).join(', ');
                        playerListEl.innerHTML = `<strong>Online:</strong> ${names}`;
                    }
                }
                if (badgeEl) {
                    badgeEl.className = 'badge bg-success me-1';
                    badgeEl.innerText = 'Online';
                }
              } else {
                el.innerHTML = `<span class="status-offline">Offline</span>`;
                if (badgeEl) {
                    badgeEl.className = 'badge bg-danger me-1';
                    badgeEl.innerText = 'Offline';
                }
              }
              if (typeof window.onServerStatusUpdate === 'function') {
                window.onServerStatusUpdate(serverName, data);
              }
            })
            .catch(e => {
              el.innerHTML = `<span class="status-offline">Error</span>`;
              const badgeEl = document.getElementById(`status-badge-${serverName}`);
              if (badgeEl) {
                  badgeEl.className = 'badge bg-danger me-1';
                  badgeEl.innerText = 'Error';
              }
            });
        }

        const statusElements = document.querySelectorAll('.server-status-poller');
        statusElements.forEach(updateServerStatus);
        setInterval(() => {
          document.querySelectorAll('.server-status-poller[data-polling="true"]').forEach(updateServerStatus);
        }, 30000);
      });
    </script>
  </body>
</html>

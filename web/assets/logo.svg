<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#2a2a55"/>
    </linearGradient>
    <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b5244"/>
      <stop offset="100%" stop-color="#3d2b1f"/>
    </linearGradient>
    <linearGradient id="snoutGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a6555"/>
      <stop offset="100%" stop-color="#4a3628"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Mane/bristles -->
  <path d="M140 120 L125 70 L150 115 L148 55 L170 112 L175 45 L195 115 L205 50 L215 120" fill="#2d1b10" opacity="0.9"/>
  <path d="M297 120 L307 50 L317 115 L325 45 L340 112 L345 55 L362 115 L365 70 L372 120" fill="#2d1b10" opacity="0.9"/>
  <!-- Head -->
  <ellipse cx="256" cy="280" rx="150" ry="170" fill="url(#fur)"/>
  <!-- Snout -->
  <ellipse cx="256" cy="375" rx="85" ry="55" fill="url(#snoutGrad)"/>
  <!-- Nostrils -->
  <ellipse cx="225" cy="374" rx="14" ry="18" fill="#1a0e08"/>
  <ellipse cx="287" cy="374" rx="14" ry="18" fill="#1a0e08"/>
  <!-- Tusks -->
  <path d="M175 355 Q155 330 148 295 Q145 280 155 285 Q165 300 168 320 Q170 340 180 350 Z" fill="#e8dcc8" stroke="#c4b8a4" stroke-width="2"/>
  <path d="M337 355 Q357 330 364 295 Q367 280 357 285 Q347 300 344 320 Q342 340 332 350 Z" fill="#e8dcc8" stroke="#c4b8a4" stroke-width="2"/>
  <!-- Eyes - fierce/angular -->
  <path d="M165 230 L220 218 L230 242 L180 250 Z" fill="#0d0805"/>
  <path d="M347 230 L292 218 L282 242 L332 250 Z" fill="#0d0805"/>
  <!-- Iris -->
  <ellipse cx="198" cy="234" rx="12" ry="10" fill="#c4900a"/>
  <ellipse cx="314" cy="234" rx="12" ry="10" fill="#c4900a"/>
  <!-- Pupils -->
  <ellipse cx="200" cy="234" rx="6" ry="10" fill="#0d0805"/>
  <ellipse cx="312" cy="234" rx="6" ry="10" fill="#0d0805"/>
  <!-- Eye glow -->
  <circle cx="204" cy="229" r="3" fill="white" opacity="0.6"/>
  <circle cx="316" cy="229" r="3" fill="white" opacity="0.6"/>
  <!-- Brow ridge - angry look -->
  <path d="M155 215 Q175 200 225 212" stroke="#1a0e08" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M357 215 Q337 200 287 212" stroke="#1a0e08" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Ears - pointed/alert -->
  <path d="M115 155 Q105 75 145 55 Q165 48 172 85 Q175 120 158 155 Z" fill="#5a3d2f"/>
  <path d="M397 155 Q407 75 367 55 Q347 48 340 85 Q337 120 354 155 Z" fill="#5a3d2f"/>
  <path d="M128 150 Q122 95 150 75 Q162 70 165 95 Q166 115 155 145 Z" fill="#3d2518"/>
  <path d="M382 150 Q388 95 362 75 Q350 70 347 95 Q346 115 357 145 Z" fill="#3d2518"/>
  <!-- Warts/bumps on snout -->
  <circle cx="195" cy="355" r="6" fill="#4a3628"/>
  <circle cx="317" cy="355" r="6" fill="#4a3628"/>
</svg>